<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="card">
        <div class="admin-note">
            <span>Create Admin Account</span>
        </div>
        <h2>Admin Signup</h2>
        <form id="adminSignupForm">
            <div class="form-group">
                <label>Admin ID</label>
                <input type="text" id="adminID" placeholder="abcd1234" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="button-primary">Create Account</button>
        </form>
        <div class="footer-link">
            Already have an admin account? <a href="AdminLogin.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('adminSignupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const adminID = document.getElementById('adminID').value.trim();
            const password = document.getElementById('password').value.trim();
            const adminPattern = /^[A-Za-z]{4}\d{4}$/;

            if (!adminPattern.test(adminID)) {
                alert('AdminID must start with 4 letters and end with 4 numbers. Example: abcd1234');
                return;
            }

            const admins = JSON.parse(localStorage.getItem('admins')) || [];
            const existing = admins.find(a => a.adminID === adminID);
            if (existing) {
                alert('This AdminID is already taken. Please choose another one.');
                return;
            }

            admins.push({ adminID, password });
            localStorage.setItem('admins', JSON.stringify(admins));
            alert('Admin account created successfully!');
            window.location.href = 'AdminLogin.html';
        });
    </script>
</body>
</html>
